name: Benchmark Automation

on:
  workflow_dispatch:
    inputs:
      infinispan_version:
        description: 'Infinispan Version (optional)'
        required: false
        type: string
      jgroups_version:
        description: 'JGroups Version (optional)'
        required: false
        type: string

      infinispan_repository:
        description: 'Custom repository to build Infinispan from (optional, infinispan/infinispan:main)'
        required: false
        type: string

      jgroups_repository:
        description: 'Custom repository to build JGroups from (optional, belaban/jgroups:master)'
        required: false
        type: string

      # Define the arguments for provisioning the environment.
      aws_region:
        description: 'The AWS region to provision'
        required: false
        default: 'sa-east-1'
        type: string

      aws_cluster_size:
        description: 'The number of nodes to provision'
        required: false
        default: '1'
        type: string

      aws_provision_arguments:
        description: 'Provide custom arguments when provisioning in AWS'
        required: false
        default: ''
        type: string

      # Define the arguments when running the benchmark.
      benchmark_arguments:
        description: 'Provide custom arguments when running the benchmark'
        required: false
        default: ''
        type: string

env:
  ANSIBLE_HOST_KEY_CHECKING: False
  INVENTORY_NAME: 'benchmark-file.yaml'
  CLUSTER_NAME: 'benchmark_runner'

jobs:
  build-application:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build IspnPerf
        uses: ./.github/actions/build
        with:
          infinispan_version: '${{ inputs.infinispan_version }}'
          infinispan_repository: '${{ inputs.infinispan_repository }}'
          jgroups_version: '${{ inputs.jgroups_version }}'
          jgroups_repository: '${{ inputs.jgroups_repository }}'

  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create AWS EC2 instances
        id: create-aws-ec2-instances
        uses: ./.github/actions/ec2-create-instances
        with:
          region: ${{ inputs.aws_region }}
          arguments: "-e test_cluster_size=${{ inputs.aws_cluster_size }} ${{ inputs.aws_provision_arguments }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Capture inventory file name
        working-directory: ansible
        run: ls -1 *_inventory.yaml | xargs -L1 -I{} cp {} $INVENTORY_NAME

      - name: Archive infrastructure files
        working-directory: ansible
        run: tar -cf ../infrastructure-state.tar *.pem "$INVENTORY_NAME"

      - name: Encrypt infrastructure
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          .github/scripts/infrastructure-encryption/main.sh \
            encrypt \
            GPG_PASSPHRASE \
            infrastructure-state.tar \
            infrastructure-state.tar.enc

      - name: Upload infrastructure artifacts
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-state
          path: infrastructure-state.tar.enc
          retention-days: 1

  run-benchmark:
    runs-on: ubuntu-latest
    needs:
      - build-application
      - provision
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Environment
        uses: ./.github/actions/restore-environment
        with:
          gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install EC2 requirements
        uses: ./.github/actions/ec2-install-requirements
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Include runner in security group
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ inputs.aws_region }}
          SECURITY_GROUP_NAME: ${{ env.CLUSTER_NAME }}
        run: |
          MY_IP=$(curl -s https://checkip.amazonaws.com)
          aws ec2 authorize-security-group-ingress \
            --group-name "$SECURITY_GROUP_NAME" \
            --protocol tcp \
            --port 22 \
            --cidr "$MY_IP/32" \
            --region $AWS_REGION || true

      - name: Setup benchmark
        uses: ./.github/actions/benchmark-setup
        with:
          inventory: $INVENTORY_NAME
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Run single benchmark
        uses: ./.github/actions/benchmark-start
        with:
          inventory: $INVENTORY_NAME
          arguments: ${{ inputs.benchmark_arguments }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Show the results
        working-directory: ansible
        run: |
          cat results.csv
          cat results.txt
          
          # Extract the last non-empty line, split by command, get second column, strip empty spaces.
          THROUGHPUT=$(tac results.csv | egrep -m 1 . | cut -d',' -f2 | xargs)
          
          cat <<EOF > benchmark-data.json
          [
            {
              "name": "Cluster Throughput",
              "unit": "reqs/sec",
              "value": $THROUGHPUT
            }
          ]
          EOF
          
          cat benchmark-data.json

      - name: Store Benchmark Result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'customBiggerIsBetter'
          output-file-path: ansible/benchmark-data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '20%'
          fail-on-alert: true


  cleanup:
    runs-on: ubuntu-latest
    needs:
      - run-benchmark
      - provision

    if: ${{ always() && needs.provision.result == 'success'  }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Environment
        uses: ./.github/actions/restore-environment
        with:
          gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Delete AWS resources
        uses: ./.github/actions/ec2-delete-instances
        with:
          region: ${{ inputs.aws_region }}
          inventory: $INVENTORY_NAME
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
