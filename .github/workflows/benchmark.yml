name: Benchmark Automation

on:
  workflow_dispatch:
    inputs:
      infinispan_version:
        description: 'Infinispan Version (optional)'
        required: false
        type: string
      jgroups_version:
        description: 'JGroups Version (optional)'
        required: false
        type: string

jobs:
  build-application:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build with Maven
        env:
          INFINISPAN_VERSION: ${{ inputs.infinispan_version }}
          JGROUPS_VERSION: ${{ inputs.jgroups_version }}
        run: |
          MVN_CMD="mvn clean install -DskipTests"
          
          if [ -n "$INFINISPAN_VERSION" ]; then
            echo "Overriding Infinispan Version with $INFINISPAN_VERSION"
            MVN_CMD="$MVN_CMD -Dversion.infinispan=$INFINISPAN_VERSION"
          fi
          
          if [ -n "$JGROUPS_VERSION" ]; then
            echo "Overriding JGroups Version with $JGROUPS_VERSION"
            MVN_CMD="$MVN_CMD -Dversion.jgroups=$JGROUPS_VERSION"
          fi

          $MVN_CMD
